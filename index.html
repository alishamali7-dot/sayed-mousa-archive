<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#12213a">
<meta name="description" content="فهرس مصنّف لمحاضرات السيد موسى العلي حسب أبواب الفقه والعقيدة، مع بحث ذكي وتصفح حسب المدة والمناسبات.">
<title>فِهرِس محاضرات السيد موسى العلي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://i.ytimg.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   Design tokens — navy ink / ivory paper / manuscript gold
   ===================================================================== */
:root{
  --ink:#12213a;--ink-2:#1b2f4e;--ink-3:#26456f;
  --ivory:#f7f1e3;--ivory-dim:#cdbfa4;
  --paper:#faf6ec;--paper-2:#f1e9d6;
  --gold:#c69a44;--gold-bright:#e2b95c;--gold-deep:#9a7526;
  --rule:#dcd0b4;--rule-dark:#2c456a;
  --text:#1d2537;--text-soft:#5b6072;--muted:#8a8778;
  --shadow:rgba(18,33,58,.16);--shadow-soft:rgba(18,33,58,.09);
  --sidebar-w:314px;
  --r-lg:20px;--r-md:14px;--r-sm:10px;
  --ease:cubic-bezier(.33,.9,.35,1);
  --dur:.18s;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scrollbar-gutter:stable}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--paper);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:var(--gold);color:var(--ink)}
a{color:inherit;text-decoration:none}
img{max-inline-size:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
select{font-family:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
h2,h3,h4,h5{text-wrap:balance}

.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100dvh}

/* =====================================================================
   Sidebar
   ===================================================================== */
.sidebar{background:linear-gradient(180deg,var(--ink),var(--ink-2));color:var(--ivory);position:sticky;top:0;height:100dvh;display:flex;flex-direction:column;border-inline-start:1px solid var(--rule-dark)}
.brand{padding-block:26px 22px;padding-inline:24px;border-bottom:1px solid var(--rule-dark);position:relative}
.brand::after{content:"";position:absolute;bottom:-1px;inset-inline:24px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.brand .kicker{font-size:.68rem;letter-spacing:3px;color:var(--gold-bright);font-weight:600;margin-bottom:7px;text-align:center}
.brand h1{font-size:1.24rem;font-weight:700;line-height:1.5;color:var(--ivory);text-align:center}

.tree-nav{flex:1;overflow-y:auto;overscroll-behavior:contain;padding-block:12px 24px;padding-inline:12px;scrollbar-width:thin;scrollbar-color:var(--ink-3) transparent}
.tree-nav::-webkit-scrollbar{width:8px}
.tree-nav::-webkit-scrollbar-thumb{background:var(--ink-3);border-radius:8px}

.nav-home{width:100%;text-align:start;padding-block:11px;padding-inline:14px;border-radius:var(--r-sm);font-size:.9rem;font-weight:600;color:var(--ivory);margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:background var(--dur) var(--ease)}
.nav-home:hover{background:var(--ink-3)}
.nav-home.active{background:var(--gold);color:var(--ink)}
.nav-home svg{width:17px;height:17px;fill:currentColor;flex:none}

.nav-sec{margin-bottom:2px}
.nav-sec-btn{width:100%;text-align:start;padding-block:10px;padding-inline:14px;border-radius:var(--r-sm);display:flex;align-items:center;gap:9px;transition:background var(--dur) var(--ease);color:var(--ivory)}
.nav-sec-btn:hover,.nav-sec-btn.active{background:var(--ink-3)}
.nav-sec-btn .tw{width:16px;height:16px;flex:none;display:grid;place-items:center;transition:transform .22s var(--ease);color:var(--gold-bright)}
.nav-sec-btn.open .tw{transform:rotate(-90deg)}
.nav-sec-btn .nm{flex:1;font-size:.9rem;font-weight:500}
.nav-sec-btn .ct{font-size:.72rem;color:var(--ivory-dim);font-variant-numeric:tabular-nums}
.nav-sec-btn.active .ct{color:var(--gold-bright)}
.nav-children{max-height:0;overflow:hidden;transition:max-height .3s var(--ease)}
.nav-children.open{max-height:1600px}
/* indentation lives on the inline-start side so children visually nest in RTL */
.nav-chap{width:100%;text-align:start;padding-block:7px;padding-inline:34px 14px;border-radius:8px;display:flex;align-items:center;gap:8px;color:var(--ivory-dim);font-size:.83rem;transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
.nav-chap:hover{background:var(--ink-3);color:var(--ivory)}
.nav-chap.active{color:var(--gold-bright);font-weight:600}
.nav-chap .nm{flex:1}
.nav-chap .ct{font-size:.7rem;font-variant-numeric:tabular-nums;opacity:.8}

.nav-label{padding-block:14px 6px;padding-inline:14px;font-size:.68rem;letter-spacing:1.5px;color:var(--gold-bright);font-weight:600;opacity:.85}
.nav-coll-btn{width:100%;text-align:start;padding-block:10px;padding-inline:14px;border-radius:var(--r-sm);display:flex;align-items:center;gap:9px;transition:background var(--dur) var(--ease);color:var(--ivory);margin-bottom:2px}
.nav-coll-btn:hover,.nav-coll-btn.active{background:var(--ink-3)}
.nav-coll-btn.active{color:var(--gold-bright)}
.nav-coll-btn svg{width:16px;height:16px;flex:none;fill:currentColor;color:var(--gold-bright)}
.nav-coll-btn .nm{flex:1;font-size:.88rem;font-weight:500}
.nav-coll-btn .ct{font-size:.72rem;color:var(--ivory-dim);font-variant-numeric:tabular-nums}
.nav-coll-btn.active .ct{color:var(--gold-bright)}
.nav-divider{border-top:1px solid var(--rule-dark);margin-block:10px;margin-inline:6px}

.nav-recent{padding-block:2px 4px;padding-inline:12px}
.nav-recent-hd{display:flex;align-items:center;justify-content:space-between;padding-block:10px 8px;padding-inline:2px}
.nav-recent-hd span{font-size:.68rem;letter-spacing:1.5px;color:var(--gold-bright);font-weight:600;opacity:.85}
.nav-recent-hd button{font-size:.7rem;color:var(--ivory-dim);text-decoration:underline;opacity:.8;padding:4px}
.nav-recent-hd button:hover{opacity:1;color:var(--ivory)}
.recent-item{display:flex;align-items:center;gap:9px;padding-block:6px;padding-inline:4px;border-radius:9px;transition:background var(--dur) var(--ease);margin-bottom:2px}
.recent-item:hover{background:var(--ink-3)}
.recent-item img{width:52px;height:30px;object-fit:cover;border-radius:5px;flex:none;background:var(--ink-3)}
.recent-item .rt{flex:1;min-width:0;font-size:.76rem;line-height:1.35;color:var(--ivory);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* =====================================================================
   Main column / topbar
   ===================================================================== */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:40;background:rgba(250,246,236,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--rule);padding-block:14px;padding-inline:30px;display:flex;align-items:center;gap:18px}
.hamburger{display:none}
.search{position:relative;flex:1;max-width:540px;display:flex;align-items:center}
.search svg{position:absolute;inset-inline-start:15px;width:18px;height:18px;fill:var(--muted);pointer-events:none}
#q{width:100%;padding-block:12px;padding-inline:44px 16px;border:1.5px solid var(--rule);border-radius:12px;background:#fff;font-family:inherit;font-size:.95rem;color:var(--text);transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease);appearance:none}
#q::placeholder{color:var(--muted)}
#q:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(198,154,68,.16)}
.count-pill{font-size:.8rem;color:var(--text-soft);white-space:nowrap;font-variant-numeric:tabular-nums;background:var(--paper-2);padding-block:7px;padding-inline:14px;border-radius:20px;border:1px solid var(--rule)}
.count-pill b{color:var(--gold-deep)}

.content{padding:30px;max-width:1400px;width:100%;margin-inline:auto}

.crumbs{display:flex;align-items:center;gap:7px;font-size:.86rem;margin-bottom:22px;flex-wrap:wrap}
.crumbs button{color:var(--gold-deep);padding-block:8px;padding-inline:6px;font-weight:500;min-height:36px}
.crumbs button:hover{text-decoration:underline}
.crumbs .sep{color:var(--muted)}
.crumbs .cur{color:var(--text);font-weight:600}

/* =====================================================================
   Hero
   ===================================================================== */
.hero{background:linear-gradient(135deg,var(--ink),var(--ink-2));color:var(--ivory);border-radius:var(--r-lg);padding-block:36px;padding-inline:34px;margin-bottom:30px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;opacity:.09;background-image:radial-gradient(circle at 1px 1px,var(--gold) 1px,transparent 0);background-size:22px 22px}
.hero-in{position:relative;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.hero-text{flex:1;min-width:240px}
.hero .eyebrow{font-size:.72rem;letter-spacing:3px;color:var(--gold-bright);font-weight:600;margin-bottom:12px}
.hero h2{font-size:clamp(1.35rem,1.05rem + 1.4vw,1.85rem);font-weight:700;line-height:1.4;margin-bottom:10px}
.hero p{color:var(--ivory-dim);font-size:.95rem;max-width:56ch}
.hero-stats{display:flex;gap:30px;margin-top:22px;flex-wrap:wrap}
.hero-stat .num{font-size:1.6rem;color:var(--gold-bright);font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.hero-stat .lbl{font-size:.76rem;color:var(--ivory-dim);margin-top:5px}

.eyebrow-row{display:flex;align-items:baseline;gap:12px;margin-block:6px 18px;flex-wrap:wrap}
.eyebrow-row h3{font-size:1.4rem;font-weight:700;color:var(--ink)}
.eyebrow-row .sub{color:var(--muted);font-size:.86rem}

/* =====================================================================
   Section / chapter cards
   ===================================================================== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px}
.node{background:var(--paper);border:1px solid var(--rule);border-radius:15px;padding-block:20px 18px;padding-inline:20px;cursor:pointer;position:relative;overflow:hidden;transition:transform var(--dur) var(--ease),box-shadow var(--dur) var(--ease),border-color var(--dur) var(--ease);display:flex;flex-direction:column;min-height:118px}
/* accent starts from the inline-start edge (right, in RTL) */
.node::before{content:"";position:absolute;top:0;inset-inline:0;height:3px;background:linear-gradient(to left,var(--gold),transparent);opacity:.7}
.node .idx{font-size:.8rem;color:var(--gold-deep);font-weight:700;margin-bottom:8px;letter-spacing:1px;font-variant-numeric:tabular-nums}
.node h4{font-size:1.18rem;font-weight:600;line-height:1.45;color:var(--ink);margin-bottom:auto}
.node .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:14px}
.node .foot .meta{font-size:.78rem;color:var(--muted)}
.node .foot .count{background:var(--ink);color:var(--gold-bright);font-size:.78rem;font-weight:600;padding-block:3px;padding-inline:12px;border-radius:20px;font-variant-numeric:tabular-nums}
.node.chap h4{font-size:1.04rem}

/* =====================================================================
   Chips + sort
   ===================================================================== */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.chip{font-size:.83rem;color:var(--text-soft);background:var(--paper);border:1px solid var(--rule);border-radius:22px;padding-block:7px;padding-inline:14px;transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease),color var(--dur) var(--ease);font-variant-numeric:tabular-nums}
.chip:hover{border-color:var(--gold);color:var(--ink)}
.chip.active{background:var(--ink);border-color:var(--ink);color:var(--gold-bright)}
.chip .n{opacity:.6;margin-inline-start:5px;font-size:.76rem}
.chip.active .n{opacity:.85}
.chip-more{border-style:dashed;color:var(--gold);font-weight:600}
.chip-more:hover{border-style:solid;background:var(--gold);color:var(--paper)}

.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;justify-content:flex-end}
.sort-label{font-size:.8rem;color:var(--text-soft)}
.sort-select{font-size:.83rem;color:var(--ink);background:var(--paper);border:1px solid var(--rule);border-radius:var(--r-sm);padding-block:6px;padding-inline:10px;cursor:pointer;transition:border-color var(--dur) var(--ease)}
.sort-select:hover{border-color:var(--gold)}

/* =====================================================================
   Video cards
   ===================================================================== */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(266px,1fr));gap:18px}
.vcard{background:#fff;border:1px solid var(--rule);border-radius:var(--r-md);overflow:hidden;display:flex;flex-direction:column;position:relative;transition:transform var(--dur) var(--ease),box-shadow var(--dur) var(--ease),border-color var(--dur) var(--ease)}
.thumb{position:relative;aspect-ratio:16/9;background:var(--paper-2);overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .dur-grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(18,33,58,.4),transparent 45%)}
.thumb .dur-badge{position:absolute;bottom:6px;inset-inline-end:6px;background:rgba(18,33,58,.82);color:var(--ivory);font-size:.7rem;font-weight:600;padding-block:2px;padding-inline:6px;border-radius:5px;font-variant-numeric:tabular-nums;letter-spacing:.02em;direction:ltr}
.thumb .play{position:absolute;inset:0;display:grid;place-items:center;background:rgba(18,33,58,0);transition:background .2s var(--ease)}
.thumb .play svg{width:50px;height:50px;opacity:0;transform:scale(.82);transition:opacity .2s var(--ease),transform .2s var(--ease);filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))}
.vbody{padding-block:14px 15px;padding-inline:15px;display:flex;flex-direction:column;flex:1}
.vtags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}
.vtag{font-size:.7rem;color:var(--gold-deep);background:rgba(198,154,68,.12);padding-block:2px;padding-inline:9px;border-radius:13px;font-weight:500}
.vcard h5{font-size:1rem;font-weight:600;line-height:1.5;color:var(--ink);margin-bottom:auto;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.vdate{margin-top:11px;font-size:.77rem;color:var(--muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-variant-numeric:tabular-nums}
.vdate svg{width:13px;height:13px;fill:var(--gold-deep);flex:none}
.vcard a.hit{position:absolute;inset:0;z-index:1}

/* lift + play reveal only on devices that actually hover */
@media(hover:hover){
  .node:hover{transform:translateY(-3px);box-shadow:0 14px 30px var(--shadow);border-color:var(--gold)}
  .vcard:hover{transform:translateY(-3px);box-shadow:0 14px 30px var(--shadow);border-color:var(--gold)}
  .vcard:hover .play{background:rgba(18,33,58,.32)}
  .vcard:hover .play svg{opacity:1;transform:scale(1)}
}
.vcard:focus-within{border-color:var(--gold);box-shadow:0 8px 20px var(--shadow-soft)}

.empty{text-align:center;padding-block:70px;padding-inline:20px;color:var(--muted)}
.empty .mk{font-size:3rem;color:var(--rule);margin-bottom:10px}
.empty h4{font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:6px}
#sentinel{height:30px}

footer{border-top:1px solid var(--rule);padding-block:22px;padding-inline:30px;text-align:center;color:var(--muted);font-size:.78rem;margin-top:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom))}
.visit-count{display:block;margin-top:6px;font-size:.72rem;color:var(--muted);opacity:.75;font-variant-numeric:tabular-nums}

.scrim{display:none}

/* =====================================================================
   Breakpoints
   ===================================================================== */
/* compact laptop */
@media(max-width:1180px) and (min-width:901px){
  :root{--sidebar-w:260px}
  .content{padding-block:24px;padding-inline:22px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .vgrid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
}
/* tablet + phone: sidebar becomes a drawer */
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;inset-block:0;inset-inline-start:0;width:min(300px,86vw);z-index:80;transform:translateX(100%);transition:transform .26s var(--ease);box-shadow:0 0 40px rgba(18,33,58,.35)}
  .sidebar.open{transform:translateX(0)}
  .scrim{display:block;position:fixed;inset:0;background:rgba(18,33,58,.45);z-index:70;opacity:0;pointer-events:none;transition:opacity .26s var(--ease)}
  .scrim.show{opacity:1;pointer-events:auto}
  .hamburger{display:grid;place-items:center;width:44px;height:44px;border:1.5px solid var(--rule);border-radius:var(--r-sm);background:#fff;flex:none}
  .hamburger svg{width:20px;height:20px;fill:var(--ink)}
  .topbar{padding-block:12px;padding-inline:16px;gap:10px}
  .search{min-width:0}
  #q{padding-block:11px;font-size:16px} /* 16px prevents iOS zoom-on-focus */
  .count-pill{display:none} /* count lives in the hero; free the row for search */
  .content{padding-block:20px;padding-inline:16px}
  .hero{padding-block:24px;padding-inline:20px;border-radius:16px}
  .hero-in{gap:18px}
  .hero-stats{gap:22px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
  .node{padding-block:15px 14px;padding-inline:14px;min-height:96px}
  .node h4{font-size:1rem}
  .node.chap h4{font-size:.94rem}
  .vgrid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .vcard h5{font-size:.9rem;-webkit-line-clamp:3}
  .vbody{padding-block:11px 12px;padding-inline:12px}
  .chip{padding-block:9px;padding-inline:15px;font-size:.86rem}
  .nav-chap{padding-block:10px;padding-inline:34px 14px}
  .crumbs{gap:2px;margin-bottom:16px}
  .crumbs button{padding-block:9px;padding-inline:7px}
  .eyebrow-row h3{font-size:1.2rem}
}
/* small phones */
@media(max-width:420px){
  .content{padding-inline:12px}
  .vgrid{grid-template-columns:repeat(2,1fr);gap:10px}
  .cards{grid-template-columns:repeat(2,1fr);gap:9px}
  .vtags{display:none} /* titles get the full card on very tight screens */
  .vcard h5{font-size:.85rem}
  .hero-stat .num{font-size:1.35rem}
  .sort-bar{justify-content:space-between}
}
/* motion sensitivity */
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}
}
</style>
<script data-goatcounter="https://alishamali7.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar" aria-label="القائمة الجانبية">
    <div class="brand">
      <div class="kicker">فِهرِس الأرشيف</div>
      <h1>محاضرات السيد موسى العلي</h1>
    </div>
    <nav class="tree-nav" id="treeNav" aria-label="فهرس الأقسام"></nav>
  </aside>
  <div class="scrim" id="scrim" aria-hidden="true"></div>
  <div class="main">
    <header class="topbar">
      <button class="hamburger" id="ham" aria-label="فتح الفهرس" aria-controls="sidebar" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg></button>
      <div class="search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
        <input id="q" type="search" inputmode="search" autocomplete="off" placeholder="ابحث في العناوين والمواضيع..." aria-label="بحث في الأرشيف">
      </div>
      <div class="count-pill" id="pill"></div>
    </header>
    <main class="content">
      <nav class="crumbs" id="crumbs" aria-label="مسار التصفح"></nav>
      <div id="view"></div>
    </main>
    <footer>أرشيف غير رسمي لأغراض التنظيم والبحث • جميع المقاطع من قناة السيد موسى العلي وقنوات أخرى على يوتيوب<span id="visitCount" class="visit-count"></span></footer>
  </div>

  const mi=+p[1]-1;
  return AR(+p[2])+' '+(months[mi]||'')+' '+p[0];
};

const VIDEO_BY_ID={};VIDEOS.forEach(v=>{VIDEO_BY_ID[v.i]=v;});
const RECENT_KEY='sma_recent_v1';
function getRecent(){try{const r=JSON.parse(localStorage.getItem(RECENT_KEY)||'[]');return Array.isArray(r)?r:[];}catch(e){return [];}}
function addRecent(id){
  let r=getRecent().filter(x=>x!==id);
  r.unshift(id);

  $$('.nav-chap').forEach(c=>c.classList.toggle('active',(c.dataset.sec===S.section&&c.dataset.chap===S.chapter&&!S.q)||(!!c.dataset.durgroupkey&&c.dataset.durgroupkey===S.durGroup&&!S.q)));

let pageItems=[],pageShown=0;const PAGE=60;
const io=new IntersectionObserver(es=>{if(es[0].isIntersecting&&pageShown<pageItems.length)appendPage();},{rootMargin:'600px'});

let SORT='date_desc';
try{const saved=localStorage.getItem('sma_sort_pref');if(saved)SORT=saved;}catch(e){}
const SORT_OPTIONS=[
  {key:'date_desc',name:'الأحدث أولاً'},
  {key:'date_asc',name:'الأقدم أولاً'},
  {key:'dur_desc',name:'الأطول أولاً'},
  {key:'dur_asc',name:'الأقصر أولاً'},
];
if(!SORT_OPTIONS.some(o=>o.key===SORT))SORT='date_desc';
function applySort(items){
  const arr=items.slice();
  if(SORT==='date_desc')arr.sort((a,b)=>(b.d||'').localeCompare(a.d||''));
  else if(SORT==='date_asc')arr.sort((a,b)=>(a.d||'').localeCompare(b.d||''));
  else if(SORT==='dur_desc')arr.sort((a,b)=>(b.sec||0)-(a.sec||0));
  else if(SORT==='dur_asc')arr.sort((a,b)=>(a.sec||0)-(b.sec||0));
  return arr;
}
function renderGrid(items,mount){
  const bar=el('div','sort-bar');
  const label=el('label','sort-label');label.textContent='ترتيب حسب:';label.setAttribute('for','sortSel');bar.appendChild(label);
  const sel=el('select','sort-select');sel.id='sortSel';
  SORT_OPTIONS.forEach(o=>{
    const opt=document.createElement('option');opt.value=o.key;opt.textContent=o.name;
    if(o.key===SORT)opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=()=>{SORT=sel.value;try{localStorage.setItem('sma_sort_pref',SORT);}catch(e){}render();};
  bar.appendChild(sel);
  mount.appendChild(bar);
  pageItems=applySort(items);pageShown=0;
  const g=el('div','vgrid');g.id='vg';mount.appendChild(g);
  const s=el('div');s.id='sentinel';mount.appendChild(s);
  appendPage();io.observe(s);
}
function appendPage(){
  const g=$('#vg');if(!g)return;
  const slice=pageItems.slice(pageShown,pageShown+PAGE);
  const f=document.createDocumentFragment();
  slice.forEach(v=>f.appendChild(vcard(v)));
  g.appendChild(f);pageShown+=slice.length;
}
function emptyState(view,msg){
  const e=el('div','empty');
  e.innerHTML='<div class="mk">؟</div><h4>'+(msg||'لا توجد مقاطع')+'</h4>';
  view.appendChild(e);
}

      const chips=el('div','chips');
      const all=el('button','chip'+(!S.topic?' active':''));all.type='button';all.innerHTML='الكل <span class="n">'+AR(ch.n)+'</span>';
      all.onclick=()=>go({level:'chapter',section:S.section,chapter:S.chapter,topic:null});chips.appendChild(all);
      const TOPIC_LIMIT=12;
      /* لو المواضيع كثيرة نعرض الأكثر تكراراً أولاً مع زر "عرض المزيد"
         تجنّباً لجدار طويل من الشرائح على الجوال */
      const overLimit=ch.topics.length>TOPIC_LIMIT+3;
      const expanded=topicsExpanded||!overLimit;
      const visible=expanded?ch.topics:ch.topics.slice(0,TOPIC_LIMIT);
      /* لو الموضوع المختار حالياً مو ضمن الظاهرة، نظهره حتى يبقى واضحاً أنه مفعّل */
      if(S.topic&&!expanded&&!visible.some(tp=>tp.name===S.topic)){
        const cur=ch.topics.find(tp=>tp.name===S.topic);
        if(cur)visible.push(cur);
      }
      visible.forEach(tp=>{
        const b=el('button','chip'+(S.topic===tp.name?' active':''));b.type='button';b.innerHTML=esc(tp.name)+' <span class="n">'+AR(tp.n)+'</span>';
        b.onclick=()=>go({level:'chapter',section:S.section,chapter:S.chapter,topic:S.topic===tp.name?null:tp.name});
        chips.appendChild(b);
      });
      if(overLimit&&!expanded){
        const more=el('button','chip chip-more');more.type='button';
        more.innerHTML='عرض المزيد (+'+AR(ch.topics.length-visible.length)+') ▾';
        more.onclick=()=>{topicsExpanded=true;render();};
        chips.appendChild(more);
      }
      view.appendChild(chips);
    }
    if(S.topic)items=items.filter(v=>v.p===S.topic);
    renderGrid(items,view);return;
  }
}

function go(next){
  const prevSection=S.section,prevChapter=S.chapter;
  S=Object.assign({level:'home',section:null,chapter:null,topic:null,q:'',collection:null,sub:null,durGroup:null,duration:null},next);
  if(S.section!==prevSection||S.chapter!==prevChapter)topicsExpanded=false;
  if(next.level)$('#q').value='';
  window.scrollTo({top:0});
  render();
}

/* =====================================================================
   Sidebar drawer + global shortcuts
   ===================================================================== */
function openSidebar(){$('#sidebar').classList.add('open');$('#scrim').classList.add('show');$('#ham').setAttribute('aria-expanded','true');}
function closeSidebar(){$('#sidebar').classList.remove('open');$('#scrim').classList.remove('show');$('#ham').setAttribute('aria-expanded','false');}
$('#ham').onclick=openSidebar;
$('#scrim').onclick=closeSidebar;

let debounceTimer;
$('#q').addEventListener('input',e=>{
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>{
    S.q=e.target.value;
    S.level='home';
    window.scrollTo({top:0});
    render();
  },170);
});
document.addEventListener('keydown',e=>{
  const q=$('#q');
  if(e.key==='/'&&document.activeElement!==q){e.preventDefault();q.focus();return;}
  if(e.key==='Escape'){
    if(document.activeElement===q&&q.value){q.value='';S.q='';render();return;}
    closeSidebar();
  }
});

/* =====================================================================
   عداد الزيارات — رقم حقيقي يجمع من كل الأجهزة عبر GoatCounter
   ===================================================================== */
function trackVisit(){
  const node=$('#visitCount');
  if(!node)return;
  fetch('https://alishamali7.goatcounter.com/counter/TOTAL.json')
    .then(r=>r.json())
    .then(d=>{
      const n=d.count_unique||d.count||0;
      if(n)node.textContent='إجمالي زوار هذا الأرشيف: '+AR(n);
    })
    .catch(()=>{});
}

buildNav();render();trackVisit();
})();
</script>
